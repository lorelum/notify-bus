# notify-bus seed config.
#
# Copy to config.yaml (gitignored) and edit. The admin UI / SQLite store is
# the live source of truth; this YAML is seed/bootstrap only — the DB wins
# on conflict. See src/lib/config/index.ts.
#
# All fields are optional. Running DB-only (no config.yaml) is valid.
#
# NOTE on templates: the Feishu adapter builds a rich card per event type
# (header color, buttons, stat tiles) in code. A template here only controls
# the *body markdown* that is folded into the card — keep it short and
# complementary to what the card already shows. Omit the template entirely
# to use the built-in defaults. See packages/server/src/lib/adapters/feishu-cards.ts.

channels:
  - name: team-feishu
    type: feishu
    webhook_url: https://open.feishu.cn/open-apis/bot/v2/hook/REPLACE_ME
    secret: "" # optional: feishu signing secret, if enabled on the bot
    enabled: true

routes:
  - name: all-events-to-team
    match_repo: "*" # glob; '*' matches every repo
    # match_event: push,pull_request # omit / leave null to match all events
    # match_action: opened,closed    # omit to match all actions
    # exclude_action: labeled,unlabeled,assigned,synchronize # blacklist; wins over match_action
    target_channel: team-feishu # resolved by name to a channel above
    priority: 100 # lower = higher priority; first match wins
    enabled: true
  # Example: get issues but silence the noisy label/assign churn.
  # - name: issues-without-label-churn
  #   match_repo: "*"
  #   match_event: issues
  #   exclude_action: labeled,unlabeled,assigned
  #   target_channel: team-feishu
  #   priority: 50

# Templates below are OPTIONAL. Each controls only the body markdown folded
# into that event type's card. The card structure (colors, buttons, commits)
# is built in code regardless. Remove a template to use the built-in default.
templates:
  - event_type: push
    template: |
      {{#if payload.head_commit}}
      Latest: {{payload.head_commit.message}}
      {{/if}}
  - event_type: pull_request
    template: |
      {{#if payload.pull_request.body}}
      > {{payload.pull_request.body}}
      {{/if}}
  - event_type: issues
    template: |
      {{#if payload.issue.body}}
      > {{payload.issue.body}}
      {{/if}}
  - event_type: release
    template: |
      {{#if payload.release.body}}
      {{payload.release.body}}
      {{/if}}
