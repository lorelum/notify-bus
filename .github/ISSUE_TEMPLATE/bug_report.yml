name: 🐛 Bug report
description: Report something that's broken or behaves unexpectedly
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please search existing issues first to avoid duplicates.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the unexpected behavior.
      placeholder: "When GitHub sent a push event, I expected a Feishu message but got ..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal reproducible steps. The more precise, the faster we can fix it.
      placeholder: |
        1. Configure a Feishu channel with signing enabled
        2. Send a push webhook from repo X
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: notify-bus version
      description: Tag, or the commit hash if running from source.
      placeholder: "0.0.0-dev / commit abc1234"
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      description: OS + Bun version + how you're running it (Docker / `bun run dev` / `bun run start`).
      placeholder: "macOS 14 / Bun 1.3.8 / Docker compose"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Webhook ingestion
        - Pipeline / middleware
        - Feishu adapter
        - Other channel adapter
        - REST API
        - Admin frontend
        - Config (YAML / SQLite)
        - Deployment / Docker
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste relevant logs or stack traces. No screenshots of text please.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
